        // --- 2. TAMPILKAN DATA BERDASARKAN LINK (URL) ---
        function loadUserData() {
            // Ambil parameter '?id=...' dari link website
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');

            // Default: kalau link dibuka polosan tanpa ?id=, kita tampilin Zahirin (atau kosongin juga bisa)
            let userData = database["zahirin"]; 

            // Kalau di link ada ?id= dan id-nya ada di database kita
            if (userId && database[userId]) {
                userData = database[userId];
            } else if (userId && !database[userId]) {
                // Kalau orang asal ketik ?id=ngawur
                document.getElementById('my-name').innerText = "Data Tidak Ditemukan";
                document.getElementById('my-role').innerText = "-";
                document.getElementById('my-company').innerText = "-";
                return; // Stop proses
            }

            // Masukkan data ke HTML
            document.getElementById('my-name').innerText = userData.name;
            document.getElementById('my-role').innerText = userData.role;
            document.getElementById('my-company').innerText = userData.company;
            
            document.getElementById('my-id').innerText = "ID: " + userData.nik.substring(0, 4) + "-" + Math.floor(Math.random() * 10000);
            
            document.getElementById('my-nik').innerText = userData.nik;
            document.getElementById('my-gender').innerText = userData.gender;
            document.getElementById('my-phone').innerText = userData.phone;
            document.getElementById('my-email').innerText = userData.email;
            document.getElementById('my-photo').src = userData.photo;
        }

        // Initialize on load
        window.onload = () => {
            loadUserData();
        };
